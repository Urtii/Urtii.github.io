# ============================================================
#  Site Settings
# ============================================================
title: "Onurcan Yılmaz"
tagline: "Research Assistant · Electrical & Electronics Engineering · Hacettepe University"
description: >-
  Academic portfolio of Onurcan Yılmaz, a research assistant at Hacettepe
  University working on legged robotics, LiDAR-based SLAM, sensor fusion,
  and neuromechanics. Ankara, Turkey.
url: "https://urtii.github.io"
baseurl: ""

# ============================================================
#  Author / Social Links
# ============================================================
author:
  name: "Onurcan Yılmaz"
  email: "onurcan@hacettepe.edu.tr"
  avatar: "/assets/img/profile.jpg"   # replace with your photo
  github: "Urtii"                                              # GitHub username
  linkedin: "yilmaz-onurcan"                                   # LinkedIn handle
  google_scholar: "BcVj4hwAAAAJ"                               # Google Scholar profile ID
  orcid: "0009-0003-6264-4290"                                 # ORCID iD
  department_url: "https://www.ee.hacettepe.edu.tr/?link=400999&sublink=285&lang=e"  # Department page

# ============================================================
#  Navigation
# ============================================================
nav_links:
  - title: "Home"
    url: "/"
  - title: "Publications"
    url: "/publications/"
  - title: "Talks"
    url: "/talks/"

cv_url: "/assets/pdf/cv.pdf"          # path to your CV PDF

# ============================================================
#  Build Settings
# ============================================================
theme: null                           # no remote theme — pure custom
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# ============================================================
#  Sass
# ============================================================
sass:
  sass_dir: _sass
  style: compressed

# ============================================================
#  Plugins (GitHub Pages safe)
# ============================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ============================================================
#  Exclude from build
# ============================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.sh"
  - README.md
