# ============================================================
#  Site Settings
# ============================================================
title: "Your Name"
tagline: "PhD Candidate · Department of X · University of Y"
description: >-
  Academic portfolio of [Your Name], a researcher working on
  [research area]. Based at [University].
url: "https://urtii.github.io"
baseurl: ""

# ============================================================
#  Author / Social Links
# ============================================================
author:
  name: "Your Name"
  email: "you@university.edu"
  avatar: "/assets/img/profile.jpg"   # replace with your photo
  github: "Urtii"                     # GitHub username
  linkedin: ""                        # LinkedIn handle
  google_scholar: ""                  # Google Scholar profile ID
  orcid: ""                           # ORCID iD, e.g. 0000-0000-0000-0000
  department_url: ""                  # Link to your department page

# ============================================================
#  Navigation
# ============================================================
nav_links:
  - title: "Home"
    url: "/"
  - title: "Publications"
    url: "/publications/"
  - title: "Talks"
    url: "/talks/"

cv_url: "/assets/pdf/cv.pdf"          # path to your CV PDF

# ============================================================
#  Build Settings
# ============================================================
theme: null                           # no remote theme — pure custom
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# ============================================================
#  Sass
# ============================================================
sass:
  sass_dir: _sass
  style: compressed

# ============================================================
#  Plugins (GitHub Pages safe)
# ============================================================
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ============================================================
#  Exclude from build
# ============================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.sh"
  - README.md
