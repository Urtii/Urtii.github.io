# ============================================================
# talks.yml
#
# Each entry supports:
#   date      (string)  — displayed as-is, e.g. "Nov 2024"
#   title     (string)  — talk title
#   venue     (string)  — event / institution name
#   slides    (url)     — optional; button hidden when omitted
#   video     (url)     — optional; button hidden when omitted
#
# Liquid conditional logic in talks.html ensures that Slides /
# Video buttons are only rendered when a URL is present.
# ============================================================

